name: Build Android APK (arm64-only)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  build:
    name: Build Arm64 Debug APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 9.3.1
        validate-wrappers: false

    - name: Decode Debug Keystore
      run: base64 -d debug.keystore.base64 > debug.keystore

    - name: Build Debug APK
      run: gradle assembleDebug

    - name: Locate Built APK File
      id: find_apk
      run: |
        APK_FILE=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
        if [ -z "$APK_FILE" ]; then
          echo "Error: Built APK could not be found!"
          exit 1
        fi
        echo "Found APK: $APK_FILE"
        echo "apk_path=$APK_FILE" >> $GITHUB_ENV

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mafia-game-arm64-v8a-debug
        path: ${{ env.apk_path }}
        if-no-files-found: error
        retention-days: 7
